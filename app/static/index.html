<!doctype html>
<html>

    <title>Mini Celery Demo</title>

    <h1>Mini Celery Demo</h1>
    <p>Enter numbers separated by commas (example: 1,2,3,4)</p>

    <pre id="result"></pre>

    <script src="/static/app.js"></script>
