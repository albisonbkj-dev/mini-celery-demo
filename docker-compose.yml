services:
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A app.celery_app:celery_app worker --loglevel=info
    depends_on:
      - redis
    volumes:
      - .:/app